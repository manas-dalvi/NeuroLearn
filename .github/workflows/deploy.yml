## .github/workflows/deploy.yml
name: NLAP — Build & Deploy to GCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  AR_REPO: nlap-images
  FRONTEND_IMAGE: nlap-frontend
  BACKEND_IMAGE: nlap-backend

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests/ -v --tb=short
        env:
          OPENAI_API_KEY: test_key
          FIREBASE_PROJECT_ID: test-project
          MONGODB_URL: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

  # ── Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build Docker Images & Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Backend Image
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.BACKEND_IMAGE }}"
          docker build \
            --tag "${IMAGE_TAG}:${{ github.sha }}" \
            --tag "${IMAGE_TAG}:latest" \
            --cache-from "${IMAGE_TAG}:latest" \
            ./backend
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"

      - name: Build & Push Frontend Image
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.FRONTEND_IMAGE }}"
          docker build \
            --tag "${IMAGE_TAG}:${{ github.sha }}" \
            --tag "${IMAGE_TAG}:latest" \
            --cache-from "${IMAGE_TAG}:latest" \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
            .
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy nlap-backend \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="MONGODB_URL=${{ secrets.MONGODB_URL }},REDIS_URL=${{ secrets.REDIS_URL }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy nlap-frontend \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5

      - name: Output Service URLs
        run: |
          echo "✅ Backend URL: $(gcloud run services describe nlap-backend --platform=managed --region=${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "✅ Frontend URL: $(gcloud run services describe nlap-frontend --platform=managed --region=${{ env.GCP_REGION }} --format='value(status.url)')"
